<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <meta
      name="description"
      content="The page you’re looking for doesn’t exist. Return to CreativeIQ for AI-ready digital marketing in San Antonio."
    />
    <link rel="canonical" href="https://creativeiqmarketing.com/" />
    <title>Page not found | CreativeIQ</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: #0b0b0f;
        color: #f5f5f7;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        width: min(36rem, 100%);
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
      }
      .eyebrow { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #a1a1aa; }
      h1 { margin: 0.75rem 0 0; font-size: clamp(1.75rem, 4vw, 2.1rem); }
      p { margin: 1rem 0 0; color: #a1a1aa; line-height: 1.6; }
      .actions { margin-top: 1.75rem; display: flex; flex-wrap: wrap; gap: 0.75rem; }
      a {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 0.7rem 1.1rem; border-radius: 0.55rem; font-weight: 600; text-decoration: none;
      }
      .primary { background: #7c3aed; color: #fff; }
      .secondary { color: #f5f5f7; border: 1px solid rgba(255,255,255,0.2); }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">404</div>
      <h1>Page not found</h1>
      <p>The page you’re looking for doesn’t exist or may have moved.</p>
      <div class="actions">
        <a class="primary" href="/">Go home</a>
        <a class="secondary" href="/contact">Contact</a>
      </div>
    </main>
  </body>
</html>
