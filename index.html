  <body>
    <!-- SVG grain filter — referenced as filter:url(#grain) anywhere in the app -->
    <svg
      style="position: absolute; width: 0; height: 0; overflow: hidden"
      aria-hidden="true"
    >
      <defs>
        <filter
          id="grain"
          x="0%"
          y="0%"
          width="100%"
          height="100%"
          color-interpolation-filters="linearRGB"
        >
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.65"
            numOctaves="3"
            stitchTiles="stitch"
            result="noise"
          />
          <feColorMatrix type="saturate" values="0" in="noise" />
        </filter>
      </defs>
    </svg>
